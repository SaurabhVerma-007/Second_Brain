services:
  - type: web
    name: second-brain
    runtime: python
    buildCommand: pip install -r server/requirements.txt && npm install && npm run build
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NODE_ENV
        value: production